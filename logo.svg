<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- background gradient (iOS-like depth) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- glass highlight -->
    <radialGradient id="glass" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- neon accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <!-- glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded iOS tile -->
  <rect x="32" y="32" width="448" height="448" rx="110"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- glass overlay -->
  <rect x="32" y="32" width="448" height="448" rx="110"
        fill="url(#glass)"/>

  <!-- central symbol: transform arrow -->
  <path d="M170 270 H290"
        stroke="url(#accent)"
        stroke-width="18"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <path d="M290 220 L340 270 L290 320"
        fill="none"
        stroke="url(#accent)"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- subtle code hint (very minimal iOS style) -->
  <text x="256" y="370"
        text-anchor="middle"
        font-size="54"
        font-family="SF Pro Display, system-ui, sans-serif"
        fill="#cbd5e1"
        opacity="0.55">
    { }
  </text>

  <!-- small runtime pulse dot -->
  <circle cx="360" cy="160" r="7" fill="#38bdf8">
    <animate attributeName="opacity"
             values="1;0.25;1"
             dur="1.4s"
             repeatCount="indefinite"/>
  </circle>

</svg>
